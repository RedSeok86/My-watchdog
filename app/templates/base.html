<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}aimie-watchdog{% endblock %}</title>

  <!-- Tabler -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" />

  <!-- Custom -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="page app-shell">
    <!-- Header -->
    <header class="navbar navbar-expand-md d-print-none app-topbar">
      <div class="container-xl">
        <div class="d-flex align-items-center justify-content-between w-100">
          <div>
            <h1 class="navbar-brand navbar-brand-autodark m-0 p-0 border-0 bg-transparent">
              <a href="{{ url_for('watchdog.dashboard') }}" class="brand-link">
                aimie-watchdog
              </a>
            </h1>
            <div class="app-subtitle">Infrastructure health overview</div>
          </div>

          <div class="navbar-nav flex-row order-md-last">
            {% block top_right %}{% endblock %}
          </div>
        </div>
      </div>
    </header>

    <!-- Main -->
    <div class="page-wrapper">
      <div class="container-xl py-4">
        {% block content %}{% endblock %}
      </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
      <div class="container-xl">
        <div class="footer-inner">
          <span>aimie-watchdog dashboard</span>
          <span class="footer-divider">|</span>
          <span>monitoring service</span>
        </div>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
